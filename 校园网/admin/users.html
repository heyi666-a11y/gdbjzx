<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>用户管理 - 广东北江中学</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --primary-color: #667eea;
            --secondary-color: #764ba2;
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-primary: #2d3748;
            --text-secondary: #718096;
            --border-color: #e2e8f0;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            --shadow-hover: 0 8px 30px rgba(102, 126, 234, 0.25);
            --success-color: #10b981;
            --warning-color: #f59e0b;
            --danger-color: #ef4444;
            --info-color: #3b82f6;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: var(--bg-color);
            color: var(--text-primary);
            min-height: 100vh;
        }

        /* 侧边栏 */
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            bottom: 0;
            width: 260px;
            background: var(--card-bg);
            box-shadow: var(--shadow);
            z-index: 100;
            transform: translateX(-100%);
            transition: transform 0.3s ease;
        }

        .sidebar.active {
            transform: translateX(0);
        }

        .sidebar-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 99;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .sidebar-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .sidebar-header {
            padding: 24px;
            background: var(--primary-gradient);
            color: white;
        }

        .admin-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .admin-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .admin-name {
            font-size: 18px;
            font-weight: 600;
        }

        .admin-role {
            font-size: 13px;
            opacity: 0.9;
        }

        .sidebar-nav {
            padding: 16px 0;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 24px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.3s ease;
            border-left: 3px solid transparent;
        }

        .nav-item:hover {
            background: var(--bg-color);
            color: var(--primary-color);
        }

        .nav-item.active {
            background: rgba(102, 126, 234, 0.1);
            color: var(--primary-color);
            border-left-color: var(--primary-color);
        }

        .nav-item i {
            width: 24px;
            text-align: center;
            font-size: 18px;
        }

        .nav-item span {
            font-size: 15px;
            font-weight: 500;
        }

        .sidebar-footer {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 16px 24px;
            border-top: 1px solid var(--border-color);
        }

        .logout-btn {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            color: var(--danger-color);
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .logout-btn:hover {
            background: rgba(239, 68, 68, 0.1);
        }

        /* 主内容区 */
        .main-content {
            margin-left: 0;
            min-height: 100vh;
            transition: margin-left 0.3s ease;
        }

        /* 顶部栏 */
        .top-bar {
            background: var(--card-bg);
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: var(--shadow);
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .top-bar-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .menu-toggle {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            background: var(--bg-color);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: none;
            color: var(--text-primary);
            font-size: 18px;
            transition: all 0.3s ease;
        }

        .menu-toggle:active {
            background: var(--border-color);
        }

        .page-title {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-primary);
        }

        /* 内容区 */
        .content-area {
            padding: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* 搜索和筛选 */
        .filter-section {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 20px;
            box-shadow: var(--shadow);
            margin-bottom: 20px;
        }

        .search-box {
            position: relative;
            margin-bottom: 16px;
        }

        .search-input {
            width: 100%;
            padding: 14px 16px 14px 48px;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            font-size: 15px;
            background: var(--bg-color);
            outline: none;
            transition: all 0.3s ease;
        }

        .search-input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .search-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            font-size: 18px;
        }

        .filter-row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .filter-select {
            padding: 10px 16px;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            font-size: 14px;
            background: var(--bg-color);
            outline: none;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .filter-select:focus {
            border-color: var(--primary-color);
        }

        /* 用户列表 */
        .users-section {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 20px;
            box-shadow: var(--shadow);
        }

        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        .section-title {
            font-size: 16px;
            font-weight: 700;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-title i {
            color: var(--primary-color);
        }

        .user-count {
            font-size: 14px;
            color: var(--text-secondary);
        }

        .user-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .user-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px;
            background: var(--bg-color);
            border-radius: 12px;
            transition: all 0.3s ease;
            animation: fadeInUp 0.4s ease both;
        }

        .user-item:nth-child(1) { animation-delay: 0.05s; }
        .user-item:nth-child(2) { animation-delay: 0.1s; }
        .user-item:nth-child(3) { animation-delay: 0.15s; }
        .user-item:nth-child(4) { animation-delay: 0.2s; }
        .user-item:nth-child(5) { animation-delay: 0.25s; }

        .user-item:active {
            background: var(--border-color);
        }

        .user-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--primary-gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
            font-weight: 600;
            flex-shrink: 0;
        }

        .user-avatar.vip {
            background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%);
        }

        .user-info {
            flex: 1;
            min-width: 0;
        }

        .user-name {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .vip-badge {
            padding: 2px 8px;
            background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%);
            color: white;
            font-size: 10px;
            border-radius: 10px;
            font-weight: 600;
        }

        .user-meta {
            font-size: 13px;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .user-meta span {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .role-badge {
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 500;
        }

        .role-badge.student {
            background: rgba(59, 130, 246, 0.1);
            color: var(--info-color);
        }

        .role-badge.teacher {
            background: rgba(16, 185, 129, 0.1);
            color: var(--success-color);
        }

        .role-badge.admin {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger-color);
        }

        .user-actions {
            display: flex;
            gap: 8px;
        }

        .action-btn-small {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            border: none;
            background: var(--card-bg);
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .action-btn-small:hover {
            background: var(--primary-color);
            color: white;
        }

        .action-btn-small.danger:hover {
            background: var(--danger-color);
        }

        /* 加载更多 */
        .load-more {
            text-align: center;
            padding: 20px;
        }

        .load-more-btn {
            padding: 12px 24px;
            background: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            font-size: 14px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .load-more-btn:active {
            background: var(--border-color);
        }

        /* 弹窗 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-content {
            background: var(--card-bg);
            width: 100%;
            max-width: 480px;
            border-radius: 24px 24px 0 0;
            padding: 24px;
            transform: translateY(100%);
            transition: transform 0.3s ease;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-overlay.active .modal-content {
            transform: translateY(0);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-title {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .modal-close {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--bg-color);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: none;
            color: var(--text-secondary);
            font-size: 18px;
            transition: all 0.3s ease;
        }

        .modal-close:active {
            background: var(--border-color);
        }

        /* 用户详情 */
        .user-detail-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 24px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .user-detail-avatar {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: var(--primary-gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 28px;
            font-weight: 600;
        }

        .user-detail-info h3 {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .user-detail-info p {
            font-size: 14px;
            color: var(--text-secondary);
        }

        .detail-section {
            margin-bottom: 20px;
        }

        .detail-label {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .detail-value {
            font-size: 15px;
            color: var(--text-primary);
            font-weight: 500;
        }

        .detail-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
        }

        /* 操作按钮组 */
        .action-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px solid var(--border-color);
        }

        .action-btn-full {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .action-btn-full.primary {
            background: var(--primary-gradient);
            color: white;
        }

        .action-btn-full.success {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
        }

        .action-btn-full.danger {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            color: white;
        }

        .action-btn-full:active {
            transform: scale(0.98);
        }

        /* 确认弹窗 */
        .confirm-content {
            text-align: center;
            padding: 32px 24px;
        }

        .confirm-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
        }

        .confirm-icon.warning {
            background: rgba(245, 158, 11, 0.1);
            color: var(--warning-color);
        }

        .confirm-icon.danger {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger-color);
        }

        .confirm-title {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 12px;
        }

        .confirm-desc {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 24px;
            line-height: 1.6;
        }

        .confirm-buttons {
            display: flex;
            gap: 12px;
        }

        .confirm-btn {
            flex: 1;
            padding: 14px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
        }

        .confirm-btn.cancel {
            background: var(--bg-color);
            color: var(--text-secondary);
        }

        .confirm-btn.confirm {
            background: var(--primary-gradient);
            color: white;
        }

        .confirm-btn.danger {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            color: white;
        }

        .confirm-btn:active {
            transform: scale(0.98);
        }

        /* Toast提示 */
        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 12px 24px;
            border-radius: 24px;
            font-size: 14px;
            z-index: 10000;
            animation: fadeInUp 0.3s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
        }

        .empty-icon {
            width: 100px;
            height: 100px;
            margin: 0 auto 20px;
            background: var(--bg-color);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            color: var(--text-secondary);
        }

        .empty-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .empty-desc {
            font-size: 14px;
            color: var(--text-secondary);
        }

        /* 响应式适配 */
        @media (min-width: 768px) {
            .sidebar {
                transform: translateX(0);
            }
            
            .main-content {
                margin-left: 260px;
            }
            
            .menu-toggle {
                display: none;
            }
        }
    </style>
</head>
<body>
    <!-- 侧边栏遮罩 -->
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

    <!-- 侧边栏 -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="admin-info">
                <div class="admin-avatar">
                    <i class="fas fa-user-shield"></i>
                </div>
                <div>
                    <div class="admin-name">管理员</div>
                    <div class="admin-role">超级管理员</div>
                </div>
            </div>
        </div>
        <nav class="sidebar-nav">
            <div class="nav-item" onclick="goToPage('dashboard')">
                <i class="fas fa-chart-line"></i>
                <span>仪表盘</span>
            </div>
            <div class="nav-item active" onclick="goToPage('users')">
                <i class="fas fa-users"></i>
                <span>用户管理</span>
            </div>
            <div class="nav-item" onclick="goToPage('content')">
                <i class="fas fa-file-alt"></i>
                <span>内容管理</span>
            </div>
            <div class="nav-item" onclick="goToPage('resources')">
                <i class="fas fa-folder-open"></i>
                <span>资源管理</span>
            </div>
            <div class="nav-item" onclick="goToPage('announcements')">
                <i class="fas fa-bullhorn"></i>
                <span>公告管理</span>
            </div>
            <div class="nav-item" onclick="goToPage('settings')">
                <i class="fas fa-cog"></i>
                <span>系统设置</span>
            </div>
        </nav>
        <div class="sidebar-footer">
            <div class="logout-btn" onclick="logout()">
                <i class="fas fa-sign-out-alt"></i>
                <span>退出登录</span>
            </div>
        </div>
    </aside>

    <!-- 主内容区 -->
    <main class="main-content">
        <!-- 顶部栏 -->
        <header class="top-bar">
            <div class="top-bar-left">
                <button class="menu-toggle" onclick="toggleSidebar()">
                    <i class="fas fa-bars"></i>
                </button>
                <h1 class="page-title">用户管理</h1>
            </div>
        </header>

        <!-- 内容区 -->
        <div class="content-area">
            <!-- 搜索和筛选 -->
            <div class="filter-section">
                <div class="search-box">
                    <i class="fas fa-search search-icon"></i>
                    <input type="text" class="search-input" id="searchInput" placeholder="搜索用户名、学号..." oninput="handleSearch(this.value)">
                </div>
                <div class="filter-row">
                    <select class="filter-select" id="roleFilter" onchange="handleFilter()">
                        <option value="all">全部角色</option>
                        <option value="student">学生</option>
                        <option value="teacher">教师</option>
                        <option value="admin">管理员</option>
                    </select>
                    <select class="filter-select" id="vipFilter" onchange="handleFilter()">
                        <option value="all">全部用户</option>
                        <option value="vip">会员</option>
                        <option value="normal">普通用户</option>
                    </select>
                    <select class="filter-select" id="sortFilter" onchange="handleFilter()">
                        <option value="newest">最新注册</option>
                        <option value="oldest">最早注册</option>
                        <option value="name">姓名排序</option>
                    </select>
                </div>
            </div>

            <!-- 用户列表 -->
            <div class="users-section">
                <div class="section-header">
                    <h2 class="section-title">
                        <i class="fas fa-users"></i>
                        用户列表
                    </h2>
                    <span class="user-count" id="userCount">共 0 位用户</span>
                </div>
                <div class="user-list" id="userList">
                    <!-- 用户项将通过JS动态生成 -->
                </div>
                <div class="load-more" id="loadMore">
                    <button class="load-more-btn" onclick="loadMore()">加载更多</button>
                </div>
            </div>
        </div>
    </main>

    <!-- 用户详情弹窗 -->
    <div class="modal-overlay" id="userDetailModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">用户详情</h2>
                <button class="modal-close" onclick="closeUserDetailModal()">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div id="userDetailContent">
                <!-- 用户详情内容将通过JS动态生成 -->
            </div>
        </div>
    </div>

    <!-- 确认弹窗 -->
    <div class="modal-overlay" id="confirmModal">
        <div class="modal-content confirm-content">
            <div class="confirm-icon" id="confirmIcon">
                <i class="fas fa-exclamation-triangle"></i>
            </div>
            <h3 class="confirm-title" id="confirmTitle">确认操作</h3>
            <p class="confirm-desc" id="confirmDesc">确定要执行此操作吗？</p>
            <div class="confirm-buttons">
                <button class="confirm-btn cancel" onclick="closeConfirmModal()">取消</button>
                <button class="confirm-btn confirm" id="confirmBtn" onclick="executeConfirm()">确认</button>
            </div>
