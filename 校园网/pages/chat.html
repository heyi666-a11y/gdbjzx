<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>聊天 - 广东北江中学校园网</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #ffffff;
            --text-primary: #1a1a1a;
            --text-secondary: #666666;
            --border-color: #f0f0f0;
            --shadow: 0 2px 8px rgba(0,0,0,0.06);
            --gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #ffffff;
            color: #1a1a1a;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            max-width: 480px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
        }

        .page-content {
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideInMsg {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header {
            background: var(--bg-color);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
            z-index: 100;
            box-shadow: var(--shadow);
            width: 100%;
        }

        .back-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--bg-color);
            border: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.15s ease-out;
        }

        .back-btn:active {
            transform: scale(0.96);
        }

        .back-btn i {
            color: var(--text-primary);
            font-size: 16px;
        }

        .chat-title {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            font-size: 17px;
            font-weight: 600;
            text-align: center;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            max-width: 200px;
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            padding-bottom: 140px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message-wrapper {
            display: flex;
            gap: 10px;
            max-width: 80%;
            animation: slideInMsg 0.3s ease-out;
        }

        .message-wrapper.sent {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message-wrapper.received {
            align-self: flex-start;
        }

        .message-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 600;
            flex-shrink: 0;
        }

        .message-content-wrapper {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .message-sender {
            font-size: 12px;
            color: var(--text-secondary);
            font-weight: 500;
            padding: 0 4px;
        }

        .message-wrapper.sent .message-sender {
            text-align: right;
        }

        .message {
            padding: 10px 14px;
            border-radius: 16px;
            font-size: 15px;
            line-height: 1.5;
            word-break: break-word;
        }

        .message.sent {
            background: var(--gradient);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.received {
            background: var(--bg-color);
            border: 1px solid #e0e0e0;
            border-bottom-left-radius: 4px;
        }

        .message-content img {
            max-width: 200px;
            border-radius: 8px;
            margin-top: 4px;
        }

        .message-time {
            font-size: 10px;
            opacity: 0.7;
            padding: 0 4px;
        }

        .message-wrapper.sent .message-time {
            text-align: right;
            color: rgba(0,0,0,0.5);
        }

        .message-wrapper.received .message-time {
            color: var(--text-secondary);
        }

        .loading-state {
            text-align: center;
            padding: 80px 20px;
            color: var(--text-secondary);
        }

        .loading-state i {
            font-size: 32px;
            margin-bottom: 16px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: var(--text-secondary);
        }

        .empty-state i {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .input-area {
            background: var(--bg-color);
            border-top: 1px solid var(--border-color);
            padding: 12px 16px;
            display: flex;
            gap: 10px;
            align-items: flex-end;
            position: fixed;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 480px;
            box-shadow: 0 -2px 8px rgba(0,0,0,0.04);
        }

        .btn:active {
            transform: scale(0.96);
            transition: all 0.15s ease-out;
        }

        .image-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: var(--bg-color);
            border: 1px solid var(--border-color);
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s ease-out;
            flex-shrink: 0;
            color: var(--text-secondary);
        }

        .image-btn.vip {
            background: var(--gradient);
            border: none;
            color: white;
        }

        .image-btn.disabled {
            opacity: 0.4;
            pointer-events: none;
        }

        .input-wrapper {
            flex: 1;
            display: flex;
            gap: 8px;
        }

        .message-input {
            flex: 1;
            padding: 10px 16px;
            border: 1px solid var(--border-color);
            border-radius: 24px;
            font-size: 15px;
            resize: none;
            max-height: 120px;
            font-family: inherit;
            background: #fafafa;
        }

        .message-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .send-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: var(--gradient);
            border: none;
            color: white;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s ease-out;
            flex-shrink: 0;
        }

        .send-btn:disabled {
            opacity: 0.5;
            pointer-events: none;
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #fff;
            border-top: 1px solid #f0f0f0;
            display: flex;
            justify-content: space-around;
            padding: 8px 0;
            z-index: 100;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #999;
            text-decoration: none;
            font-size: 11px;
            transition: all 0.2s ease;
            padding: 4px 12px;
        }

        .nav-item.active {
            color: #667eea;
        }

        .nav-item i {
            font-size: 20px;
            margin-bottom: 4px;
        }

        .nav-item:active {
            transform: scale(0.9);
        }

        @media (min-width: 481px) {
            body {
                background: #f5f5f5;
            }

            .header {
                max-width: 480px;
                left: 50%;
                transform: translateX(-50%);
                border-radius: 0 0 12px 12px;
            }

            .bottom-nav {
                max-width: 480px;
                left: 50%;
                transform: translateX(-50%);
                border-radius: 16px 16px 0 0;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <button class="back-btn btn" onclick="history.back()">
            <i class="fas fa-chevron-left"></i>
        </button>
        <h1 class="chat-title" id="chatTitle">聊天</h1>
        <div class="back-btn" style="visibility: hidden;"></div>
    </header>

    <div class="messages-container page-content" id="messagesList">
        <div class="loading-state">
            <i class="fas fa-spinner"></i>
            <p>加载中...</p>
        </div>
    </div>

    <div class="input-area">
        <button class="image-btn btn disabled" id="imageBtn" title="发送图片">
            <i class="fas fa-image"></i>
        </button>
        <div class="input-wrapper">
            <textarea class="message-input" id="messageInput" placeholder="输入消息..." rows="1"></textarea>
        </div>
        <button class="send-btn btn" id="sendBtn">
            <i class="fas fa-paper-plane"></i>
        </button>
    </div>

    <nav class="bottom-nav">
        <a href="home.html" class="nav-item"><i class="fas fa-home"></i><span>首页</span></a>
        <a href="tieba.html" class="nav-item"><i class="fas fa-comments"></i><span>论坛</span></a>
        <a href="channels.html" class="nav-item"><i class="fas fa-broadcast-tower"></i><span>频道</span></a>
        <a href="messages.html" class="nav-item active"><i class="fas fa-envelope"></i><span>消息</span></a>
        <a href="profile.html" class="nav-item"><i class="fas fa-user"></i><span>我的</span></a>
    </nav>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://verskaemxqoukhnlwnbq.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_gtr_WIuZKiChZwJz8mR6pw_mk_SAYlG';

        let supabaseClient = null;
        if (window.supabase && window.supabase.createClient) {
            supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        }

        function showToast(message, type = 'info') {
            let toast = document.getElementById('toastContainer');
            if (!toast) {
                toast = document.createElement('div');
                toast.id = 'toastContainer';
                toast.style.cssText = 'position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:9999;pointer-events:none;';
                document.body.appendChild(toast);
            }
            const toastItem = document.createElement('div');
            const colors = { error: '#ef4444', success: '#10b981', info: '#667eea', warning: '#f59e0b' };
            toastItem.style.cssText = `background:${colors[type]};color:white;padding:12px 24px;border-radius:8px;font-size:14px;margin-bottom:8px;animation:slideIn 0.3s ease;`;
            toastItem.textContent = message;
            toast.appendChild(toastItem);
            setTimeout(() => { toastItem.style.opacity = '0'; setTimeout(() => toastItem.remove(), 300); }, 3000);
        }

        const messagesList = document.getElementById('messagesList');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const imageBtn = document.getElementById('imageBtn');
        const chatTitle = document.getElementById('chatTitle');

        let currentUser = null;
        let chatUserId = null;
        let chatGroupId = null;
        let isVip = false;
        let chatMode = 'private';
        let lastMessageId = null;
        let messageLoading = false;

        function getParams() {
            const params = new URLSearchParams(window.location.search);
            chatUserId = params.get('userId');
            chatGroupId = params.get('groupId');
            const name = params.get('name');

            if (chatGroupId) {
                chatMode = 'group';
                chatTitle.textContent = decodeURIComponent(name || '群聊');
            } else if (chatUserId) {
                chatMode = 'private';
                chatTitle.textContent = decodeURIComponent(name || '私聊');
            } else {
                chatTitle.textContent = '聊天';
            }
        }

        function checkAuth() {
            const user = localStorage.getItem('currentUser') || localStorage.getItem('user');
            if (!user) {
                showToast('请先登录', 'warning');
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1500);
                return null;
            }
            return JSON.parse(user);
        }

        function updateVipStatus() {
            // 检查是否有高级会员权限（需要联系管理员开通）
            isVip = currentUser && (currentUser.is_vip || currentUser.user_type === 'teacher' || currentUser.user_type === 'vip' || currentUser.user_type === 'admin' || currentUser.can_send_image);
            if (isVip) {
                imageBtn.classList.remove('disabled');
                imageBtn.classList.add('vip');
            }
        }

        async function loadPrivateMessages() {
            if (!currentUser || !chatUserId || !supabaseClient) return [];

            try {
                const { data, error } = await supabaseClient
                    .from('messages')
                    .select('*, sender:profiles!sender_id(name)')
                    .or(`and(sender_id.eq.${currentUser.id},receiver_id.eq.${chatUserId}),and(sender_id.eq.${chatUserId},receiver_id.eq.${currentUser.id})`)
                    .order('created_at', { ascending: true });

                if (error) throw error;
                return data || [];
            } catch (err) {
                console.error('Load messages error:', err);
                return [];
            }
        }

        async function loadGroupMessages() {
            if (!currentUser || !chatGroupId || !supabaseClient) return [];

            try {
                const { data, error } = await supabaseClient
                    .from('group_messages')
                    .select('*, sender:profiles!sender_id(name)')
                    .eq('group_id', chatGroupId)
                    .order('created_at', { ascending: true });

                if (error) throw error;
                return data || [];
            } catch (err) {
                console.error('Load group messages error:', err);
                return [];
            }
        }

        async function loadMessages() {
            if (messageLoading) return;
            messageLoading = true;
            
            let messages = [];
            if (chatMode === 'group') {
                messages = await loadGroupMessages();
            } else {
                messages = await loadPrivateMessages();
                // 标记未读消息为已读
                await markMessagesAsRead();
            }
            
            if (messages.length > 0) {
                lastMessageId = messages[messages.length - 1].id;
            }
            
            renderMessages(messages);
            messageLoading = false;
        }
        
        async function markMessagesAsRead() {
            if (chatMode !== 'private' || !chatUserId || !supabaseClient) return;
            
            try {
                await supabaseClient
                    .from('messages')
                    .update({ read_at: new Date().toISOString() })
                    .eq('receiver_id', currentUser.id)
                    .eq('sender_id', chatUserId)
                    .eq('read_at', null);
            } catch (err) {
                console.error('Mark messages as read error:', err);
            }
        }
        
        async function loadNewMessages() {
            if (!lastMessageId || messageLoading) return;
            messageLoading = true;
            
            let newMessages = [];
            try {
                if (chatMode === 'group') {
                    const { data, error } = await supabaseClient
                        .from('group_messages')
                        .select('*, sender:profiles!sender_id(name)')
                        .eq('group_id', chatGroupId)
                        .gt('id', lastMessageId)
                        .order('created_at', { ascending: true });
                    
                    if (error) throw error;
                    newMessages = data || [];
                } else {
                    const { data, error } = await supabaseClient
                        .from('messages')
                        .select('*, sender:profiles!sender_id(name)')
                        .or(`and(sender_id.eq.${currentUser.id},receiver_id.eq.${chatUserId}),and(sender_id.eq.${chatUserId},receiver_id.eq.${currentUser.id})`)
                        .gt('id', lastMessageId)
                        .order('created_at', { ascending: true });
                    
                    if (error) throw error;
                    newMessages = data || [];
                }
                
                if (newMessages.length > 0) {
                    lastMessageId = newMessages[newMessages.length - 1].id;
                    appendMessages(newMessages);
                }
            } catch (err) {
                console.error('Load new messages error:', err);
            } finally {
                messageLoading = false;
            }
        }
        
        function appendMessages(messages) {
            if (messages.length === 0) return;
            
            // 检查是否当前显示的是空状态，如果是则清空
            const emptyState = messagesList.querySelector('.empty-state');
            if (emptyState) {
                emptyState.remove();
            }
            
            const newContent = messages.map(msg => {
                const isSent = msg.sender_id === currentUser.id;
                let senderName = '';
                let senderInitial = '';

                if (chatMode === 'group') {
                    if (msg.sender && msg.sender.name) {
                        senderName = msg.sender.name;
                    } else if (msg.sender_name) {
                        senderName = msg.sender_name;
                    } else {
                        senderName = '未知用户';
                    }
                    senderInitial = senderName.charAt(0);
                } else {
                    // 私聊模式
                    senderName = isSent ? (currentUser.name || '我') : (decodeURIComponent(new URLSearchParams(window.location.search).get('name') || '对方'));
                    senderInitial = senderName.charAt(0);
                }

                return `
                    <div class="message-wrapper ${isSent ? 'sent' : 'received'}">
                        <div class="message-avatar">${senderInitial}</div>
                        <div class="message-content-wrapper">
                            <div class="message-sender">${escapeHtml(senderName)}</div>
                            <div class="message ${isSent ? 'sent' : 'received'}">${formatMessageContent(msg.content, msg.message_type)}</div>
                            <div class="message-time">${formatTime(msg.created_at)}</div>
                        </div>
                    </div>
                `;
            }).join('');
            
            messagesList.insertAdjacentHTML('beforeend', newContent);
            messagesList.scrollTop = messagesList.scrollHeight;
        }

        function renderMessages(messages) {
            if (messages.length === 0) {
                messagesList.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-comments"></i>
                        <p>暂无消息，开始聊天吧</p>
                    </div>
                `;
                return;
            }

            messagesList.innerHTML = messages.map(msg => {
                const isSent = msg.sender_id === currentUser.id;
                let senderName = '';
                let senderInitial = '';

                if (chatMode === 'group') {
                    if (msg.sender && msg.sender.name) {
                        senderName = msg.sender.name;
                    } else if (msg.sender_name) {
                        senderName = msg.sender_name;
                    } else {
                        senderName = '未知用户';
                    }
                    senderInitial = senderName.charAt(0);
                } else {
                    // 私聊模式
                    senderName = isSent ? (currentUser.name || '我') : (decodeURIComponent(new URLSearchParams(window.location.search).get('name') || '对方'));
                    senderInitial = senderName.charAt(0);
                }

                return `
                    <div class="message-wrapper ${isSent ? 'sent' : 'received'}">
                        <div class="message-avatar">${senderInitial}</div>
                        <div class="message-content-wrapper">
                            <div class="message-sender">${escapeHtml(senderName)}</div>
                            <div class="message ${isSent ? 'sent' : 'received'}">${formatMessageContent(msg.content, msg.message_type)}</div>
                            <div class="message-time">${formatTime(msg.created_at)}</div>
                        </div>
                    </div>
                `;
            }).join('');

            messagesList.scrollTop = messagesList.scrollHeight;
        }

        function formatMessageContent(content, type) {
            if (type === 'image') {
                return `<img src="${content}" alt="图片" loading="lazy">`;
            }
            return escapeHtml(content);
        }

        async function sendMessage() {
            const content = messageInput.value.trim();
            if (!content) return;

            if (!currentUser) {
                showToast('请先登录', 'warning');
                return;
            }

            if (!supabaseClient) {
                showToast('服务暂不可用', 'error');
                return;
            }

            try {
                if (chatMode === 'group') {
                    const { error } = await supabaseClient
                        .from('group_messages')
                        .insert({
                            group_id: chatGroupId,
                            sender_id: currentUser.id,
                            content: content,
                            message_type: 'text'
                        });

                    if (error) throw error;
                } else {
                    const { error } = await supabaseClient
                        .from('messages')
                        .insert({
                            sender_id: currentUser.id,
                            receiver_id: chatUserId,
                            content: content,
                            message_type: 'text'
                        });

                    if (error) throw error;
                }

                messageInput.value = '';
                messageInput.style.height = 'auto';
                // 发送消息后触发一次新消息检查，而不是全量刷新
                await loadNewMessages();
            } catch (err) {
                console.error('Send message error:', err);
                showToast('发送失败', 'error');
            }
        }

        async function sendImage(url) {
            if (!currentUser || !isVip) {
                showToast('请联系管理员获取高级会员权限以发送图片', 'warning');
                return;
            }

            try {
                if (chatMode === 'group') {
                    const { error } = await supabaseClient
                        .from('group_messages')
                        .insert({
                            group_id: chatGroupId,
                            sender_id: currentUser.id,
                            content: url,
                            message_type: 'image'
                        });

                    if (error) throw error;
                } else {
                    const { error } = await supabaseClient
                        .from('messages')
                        .insert({
                            sender_id: currentUser.id,
                            receiver_id: chatUserId,
                            content: url,
                            message_type: 'image'
                        });

                    if (error) throw error;
                }

                // 发送消息后触发一次新消息检查，而不是全量刷新
                await loadNewMessages();
            } catch (err) {
                console.error('Send image error:', err);
                showToast('发送图片失败', 'error');
            }
        }

        function formatTime(time) {
            if (!time) return '';
            const date = new Date(time);
            const now = new Date();
            const diff = now - date;
            const oneDay = 24 * 60 * 60 * 1000;

            if (diff < oneDay && date.getDate() === now.getDate()) {
                return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            } else if (diff < 2 * oneDay) {
                return '昨天 ' + date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            } else {
                return date.toLocaleDateString([], { month: 'short', day: 'numeric' }) + ' ' + date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            }
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function handleImageUpload() {
            if (!isVip) {
                showToast('请联系管理员获取高级会员权限以发送图片', 'warning');
                return;
            }

            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.onchange = async function(e) {
                const file = e.target.files[0];
                if (!file) return;

                if (file.size > 5 * 1024 * 1024) {
                    showToast('图片大小不能超过5MB', 'warning');
                    return;
                }

                const reader = new FileReader();
                reader.onload = async function(e) {
                    const base64 = e.target.result;
                    showToast('正在上传图片...', 'info');

                    if (supabaseClient) {
                        try {
                            const fileName = `${Date.now()}_${file.name}`;
                            const { error: uploadError } = await supabaseClient.storage
                                .from('chat-images')
                                .upload(fileName, base64);

                            if (uploadError) throw uploadError;

                            const { data: urlData } = supabaseClient.storage
                                .from('chat-images')
                                .getPublicUrl(fileName);

                            await sendImage(urlData.publicUrl);
                            showToast('图片发送成功', 'success');
                        } catch (err) {
                            console.error('Upload error:', err);
                            showToast('上传失败，请重试', 'error');
                        }
                    }
                };
                reader.readAsDataURL(file);
            };
            input.click();
        }

        sendBtn.addEventListener('click', sendMessage);

        messageInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        messageInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 120) + 'px';
        });

        imageBtn.addEventListener('click', handleImageUpload);

        getParams();
        currentUser = checkAuth();

        if (currentUser) {
            updateVipStatus();
            loadMessages();
            setInterval(loadNewMessages, 3000);
        }
    </script>
</body>
</html>
